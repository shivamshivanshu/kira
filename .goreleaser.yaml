version: 2

builds:
  - main: ./cmd/kira
    binary: kira
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/shivamshivanshu/kira/internal/cli.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "kira_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  disable: true
